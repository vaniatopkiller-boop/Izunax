<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZUNAX | Gaming</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background: #0b0c10; color: #fff; font-family: sans-serif; padding: 20px; }
        .box { background: #1f2833; padding: 20px; border-radius: 8px; max-width: 400px; margin: 0 auto; border: 1px solid #45f3ff; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #45f3ff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #66fcf1; color: #000; font-weight: bold; border: none; cursor: pointer; }
        #log { margin-top: 15px; padding: 10px; background: #ff0055; color: #fff; display: none; border-radius: 4px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Регистрация Игрока</h2>
    <form id="g-form">
        <input type="text" id="g-login" placeholder="Игровой Логин" required>
        <input type="email" id="g-email" placeholder="Ваш Gmail" required>
        <input type="password" id="g-pass" placeholder="Пароль" required>
        <select id="g-faction">
            <option value="Shadow Syndicate">Shadow Syndicate</option>
            <option value="Cyber Warriors">Cyber Warriors</option>
        </select>
        <button type="submit">Сохранить данные</button>
    </form>
    <div id="log"></div>
</div>

<script>
    // Проверка базы сразу при загрузке
    setTimeout(() => {
        const logBox = document.getElementById('log');
        if (!window.db) {
            logBox.style.display = 'block';
            logBox.innerText = "Ошибка: window.db не найден! Проверь файл firebase-config.js";
        }
    }, 1500);

    document.getElementById('g-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const logBox = document.getElementById('log');
        logBox.style.display = 'none';

        if (!window.db) {
            alert("База данных недоступна");
            return;
        }

        window.db.collection("game_accounts").add({
            game_login: document.getElementById('g-login').value,
            gmail: document.getElementById('g-email').value,
            password: document.getElementById('g-pass').value,
            faction: document.getElementById('g-faction').value,
            createdAt: new Date()
        })
        .then(() => {
            alert("Данные успешно улетели в Firebase!");
            document.getElementById('g-form').reset();
        })
        .catch((err) => {
            logBox.style.display = 'block';
            logBox.innerText = "Ошибка Firebase: " + err.message;
        });
    });
</script>

</body>
</html>
