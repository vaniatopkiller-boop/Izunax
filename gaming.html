<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZUNAX // Terminal</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #05050a;
            --panel-bg: #0f111a;
            --neon-cyan: #0ff;
            --neon-pink: #f0f;
            --border-color: #1a1e2d;
            --text-main: #c5c6c7;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
        }

        #auth-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: var(--panel-bg);
            border: 1px solid var(--neon-cyan);
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            position: relative;
            z-index: 10;
        }

        h1 { text-align: center; color: var(--neon-cyan); text-transform: uppercase; text-shadow: 0 0 10px var(--neon-cyan); letter-spacing: 2px; margin-bottom: 25px; }
        
        .tab-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 12px; background: transparent; border: 1px solid var(--neon-cyan); 
            color: var(--neon-cyan); cursor: pointer; font-family: inherit; font-weight: bold; text-transform: uppercase;
        }
        .tab-btn.active { background: var(--neon-cyan); color: #000; box-shadow: 0 0 10px var(--neon-cyan); }

        .input-group { margin-bottom: 18px; position: relative; }
        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .required-tag { color: var(--neon-pink); font-weight: bold; float: right; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; background: #000; color: #fff; 
            border: 1px solid var(--border-color); box-sizing: border-box; font-family: inherit;
        }
        input:focus, select:focus { border-color: var(--neon-cyan); outline: none; box-shadow: 0 0 10px rgba(0, 255, 255, 0.3); }

        .security-notice { font-size: 11px; color: #666; margin-top: 5px; line-height: 1.3; }

        .btn-main {
            width: 100%; padding: 14px; background: transparent; border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan); font-weight: bold; cursor: pointer; text-transform: uppercase;
            transition: 0.3s; font-family: inherit; letter-spacing: 1px; margin-top: 10px;
        }
        .btn-main:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }

        #main-hub { display: none; position: relative; z-index: 10; }
        .hub-nav { display: flex; justify-content: space-between; align-items: center; background: var(--panel-bg); padding: 15px 20px; border-bottom: 1px solid var(--neon-cyan); }
        .nav-logo { color: var(--neon-cyan); margin: 0; }
        .nav-links { display: flex; gap: 15px; }
        .nav-btn { background: none; border: none; color: #fff; cursor: pointer; font-family: inherit; text-transform: uppercase; padding: 5px 10px; }
        .nav-btn.active { color: var(--neon-pink); border-bottom: 2px solid var(--neon-pink); }
        
        .hub-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .feed-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .post-card { 
            background: var(--panel-bg); 
            border: 1px solid var(--border-color); 
            padding: 20px; 
            transition: all 0.3s ease;
        }
        .post-card:hover {
            box-shadow: 0 0 15px var(--neon-cyan);
            transform: scale(1.02);
            animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both;
        }
        
        @keyframes glitch {
            0% { transform: translate(0) scale(1.02); }
            20% { transform: translate(-2px, 2px) scale(1.02); }
            40% { transform: translate(-2px, -2px) scale(1.02); }
            60% { transform: translate(2px, 2px) scale(1.02); }
            100% { transform: translate(0) scale(1.02); }
        }

        .post-header { display: flex; justify-content: space-between; color: #666; font-size: 12px; margin-bottom: 10px; }
        .action-link { display: inline-block; margin-top: 15px; color: var(--neon-cyan); text-decoration: none; font-size: 14px; border: 1px solid var(--neon-cyan); padding: 8px 15px; }
        .action-link:hover { background: var(--neon-cyan); color: #000; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="auth-section">
    <div class="auth-card">
        <h1>IZUNAX TERMINAL</h1>
        
        <div class="tab-container">
            <button class="tab-btn active" id="tab-login" onclick="setMode('login')">Вход</button>
            <button class="tab-btn" id="tab-reg" onclick="setMode('reg')">Регистрация</button>
        </div>

        <form id="auth-form">
            <div class="input-group">
                <label>Адрес связи (Gmail) <span class="required-tag">[ОБЯЗАТЕЛЬНО]</span></label>
                <input type="email" id="g-email" placeholder="example@gmail.com" required>
            </div>

            <div class="input-group">
                <label>Ключ доступа (Пароль) <span class="required-tag">[ОБЯЗАТЕЛЬНО]</span></label>
                <input type="password" id="g-pass" placeholder="Введите настоящий игровой пароль" required>
                <div class="security-notice">
                    *Внимание: используйте ваш постоянный пароль от игрового аккаунта для синхронизации с базой данных.
                </div>
            </div>

            <div class="input-group" id="nick-group" style="display: none;">
                <label>Позывной (Никнейм) <span class="required-tag">[ОБЯЗАТЕЛЬНО]</span></label>
                <input type="text" id="g-login" placeholder="Ваш игровой ник">
            </div>
            
            <div id="reg-fields" style="display: none;">
                <div class="input-group">
                    <label>Выбор Фракции</label>
                    <select id="g-faction">
                        <option value="Синдикат">Теневой Синдикат</option>
                        <option value="Dagon Explorers">Исследователи Dagon</option>
                        <option value="Кибер Воины">Кибер Воины</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Сводка (О себе)</label>
                    <textarea id="g-bio" rows="2" placeholder="Пара слов для профиля..."></textarea>
                </div>

                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                    <input type="color" id="g-color" value="#00ffff" style="width: 40px; height: 40px; padding: 0; margin: 0; border: none; cursor: pointer;">
                    <span style="font-size: 12px; color: #888;">Цвет интерфейса профиля</span>
                </div>
            </div>

            <button type="submit" class="btn-main" id="submit-btn">Авторизовать терминал</button>
        </form>
    </div>
</div>

<div id="main-hub">
    <nav class="hub-nav">
        <h2 class="nav-logo">IZUNAX // HUB</h2>
        <div class="nav-links">
            <button class="nav-btn active" id="btn-tab-feed" onclick="switchTab('feed')">Лента</button>
            <button class="nav-btn" id="btn-tab-profile" onclick="switchTab('profile')">Профиль</button>
        </div>
    </nav>
    <div class="hub-container">
        <div id="feed-view" class="feed-grid"></div>
        
        <div id="profile-view" style="display: none;">
            <div id="p-card-body" style="background: var(--panel-bg); padding: 30px; border: 1px solid var(--neon-cyan); text-align: center;">
                <div id="p-avatar" style="width: 80px; height: 80px; border: 2px solid var(--neon-cyan); borderRadius: 50%; margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 24px;">U</div>
                <h2 id="p-login" style="color: var(--neon-cyan); margin: 0 0 10px 0;"></h2>
                <p id="p-email" style="margin: 5px 0; color: #888;"></p>
                <p id="p-faction" style="margin: 5px 0; font-weight: bold;"></p>
                <p id="p-bio" style="margin: 15px 0; color: var(--text-main); font-style: italic;"></p>
                <p id="p-xp" style="margin: 10px 0; color: var(--neon-pink); font-weight: bold; font-family: monospace;"></p>
                
                <div style="margin-top: 25px; display: flex; justify-content: center; gap: 15px;">
                    <a href="publish.html" class="action-link">Создать публикацию</a>
                    <button onclick="localStorage.removeItem('izunax_user'); location.reload();" class="btn-main" style="border-color:var(--neon-pink); color:var(--neon-pink); margin: 0; max-width: 150px; padding: 8px;">Выйти</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="izunax-extras.js"></script>
<script src="gaming.js"></script>
</body>
</html>
