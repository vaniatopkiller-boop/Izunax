<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZUNAX // Cyber Brutalism Terminal</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-black: #030305;
            --panel-dark: #07090e;
            --neon-blue: #00a2ff;
            --cyber-cyan: #00f0ff;
            --border-blue: #111a2e;
            --text-bright: #ffffff;
            --text-muted: #53647c;
        }

        body { 
            background: var(--bg-black); 
            color: var(--text-bright); 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.12;
            pointer-events: none;
        }

        /* --- СТИЛЬ АВТОРИЗАЦИИ (БРУТАЛИЗМ) --- */
        #auth-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: var(--panel-dark);
            border: 1px solid var(--border-blue);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            position: relative;
        }

        .tech-index {
            font-size: 14px;
            color: var(--neon-blue);
            font-weight: bold;
            margin-bottom: 5px;
        }

        h1 { 
            font-size: 32px; 
            font-weight: 900; 
            color: var(--text-bright); 
            text-transform: uppercase; 
            margin: 0 0 30px 0;
            letter-spacing: -1px;
        }
        
        .tab-container { display: flex; border: 1px solid var(--border-blue); margin-bottom: 25px; }
        .tab-btn { 
            flex: 1; padding: 15px; background: transparent; border: none;
            color: var(--text-muted); cursor: pointer; font-family: inherit; font-weight: bold; text-transform: uppercase;
            font-size: 13px; transition: 0.2s;
        }
        .tab-btn.active { background: var(--border-blue); color: var(--cyber-cyan); }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .required-tag { color: var(--neon-blue); font-weight: bold; float: right; }
        
        input, select, textarea { 
            width: 100%; padding: 14px; background: #000; color: #fff; 
            border: 1px solid var(--border-blue); box-sizing: border-box; font-family: inherit;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--neon-blue); outline: none; }

        .security-notice { font-size: 11px; color: var(--text-muted); margin-top: 6px; line-height: 1.4; }

        /* Фирменная сплошная кнопка из референса */
        .btn-main {
            width: 100%; padding: 16px; background: var(--neon-blue); border: none;
            color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase;
            font-family: inherit; letter-spacing: 1px; margin-top: 15px; font-size: 14px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-main:hover { background: var(--cyber-cyan); }

        /* --- ГЛАВНЫЙ ИНТЕРФЕЙС ХАБА --- */
        #main-hub { display: none; }
        
        .hub-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--panel-dark); padding: 20px 40px; 
            border-bottom: 1px solid var(--border-blue); 
        }
        .nav-logo { color: var(--text-bright); margin: 0; font-size: 20px; font-weight: 900; text-transform: uppercase; }
        .nav-links { display: flex; gap: 20px; }
        .nav-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-family: inherit; text-transform: uppercase; padding: 10px 0; font-weight: bold; font-size: 13px; }
        .nav-btn.active { color: var(--cyber-cyan); }
        
        .hub-container { max-width: 1200px; margin: 40px auto; padding: 0 40px; }
        
        .section-title {
            font-size: 14px; color: var(--text-muted); text-transform: uppercase;
            margin-bottom: 25px; border-bottom: 1px solid var(--border-blue); padding-bottom: 10px;
            display: flex; gap: 10px;
        }
        .section-title span { color: var(--neon-blue); font-weight: bold; }

        /* Сетка постов */
        .feed-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1px; background: var(--border-blue); }
        
        .post-card { 
            background: var(--panel-dark); 
            padding: 30px; 
            transition: background 0.2s;
        }
        .post-card:hover {
            background: #0d121f;
        }
        
        .post-header { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 11px; margin-bottom: 15px; text-transform: uppercase; }
        .post-header span:first-child { color: var(--neon-blue); }
        .post-title { font-size: 18px; font-weight: bold; margin: 0 0 10px 0; text-transform: uppercase; color: var(--text-bright); }
        .post-text { font-size: 13px; color: #a0aec0; line-height: 1.6; margin: 0; }

        /* Профиль в стиле системного статуса */
        .profile-container {
            border: 1px solid var(--border-blue);
            background: var(--panel-dark);
            padding: 40px;
        }
        
        .status-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #0f172a;
            font-size: 14px;
        }
        .status-label { color: var(--text-muted); text-transform: uppercase; }
        .status-value { color: var(--text-bright); font-weight: bold; }
        
        .action-link { 
            display: inline-flex; justify-content: space-between; align-items: center;
            margin-top: 30px; background: var(--text-bright); color: #000; 
            text-decoration: none; font-size: 13px; font-weight: bold; padding: 15px 25px; text-transform: uppercase;
        }
        .action-link:hover { background: var(--cyber-cyan); }

        /* Полоса предупреждения (Zebra Stripes) из низа картинки */
        .zebra-footer {
            height: 15px;
            background: repeating-linear-gradient(
                -45deg,
                #000,
                #000 10px,
                var(--neon-blue) 10px,
                var(--neon-blue) 20px
            );
            margin-top: 60px;
            border-top: 1px solid var(--border-blue);
        }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<!-- ЭКРАН ВХОДА -->
<div id="auth-section">
    <div class="auth-card">
        <div class="tech-index">//SCN_01</div>
        <h1>IZUNAX_TERMINAL</h1>
        
        <div class="tab-container">
            <button class="tab-btn active" id="tab-login" onclick="setMode('login')">Вход</button>
            <button class="tab-btn" id="tab-reg" onclick="setMode('reg')">Регистрация</button>
        </div>

        <form id="auth-form">
            <div class="input-group">
                <label>Адрес связи (Gmail) <span class="required-tag">/REQ</span></label>
                <input type="email" id="g-email" placeholder="USER@GMAIL.COM" required>
            </div>

            <div class="input-group">
                <label>Ключ доступа (Пароль) <span class="required-tag">/REQ</span></label>
                <input type="password" id="g-pass" placeholder="••••••••••••" required>
                <div class="security-notice">
                    *SYSTEM_ALERT: Используйте настоящий игровой ключ для синхронизации структуры.
                </div>
            </div>

            <div class="input-group" id="nick-group" style="display: none;">
                <label>Позывной (Никнейм) <span class="required-tag">/REQ</span></label>
                <input type="text" id="g-login" placeholder="NETRUNNER_ID">
            </div>
            
            <div id="reg-fields" style="display: none;">
                <div class="input-group">
                    <label>Выбор Фракции</label>
                    <select id="g-faction">
                        <option value="Синдикат">ТЕНЕВОЙ СИНДИКАТ</option>
                        <option value="Dagon Explorers">ИССЛЕДОВАТЕЛИ DAGON</option>
                        <option value="Кибер Воины">КИБЕР ВОИНЫ</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>Сводка (О себе)</label>
                    <textarea id="g-bio" rows="2" placeholder="ВВЕДИТЕ ДАННЫЕ..."></textarea>
                </div>
                <input type="hidden" id="g-color" value="#00a2ff">
            </div>

            <button type="submit" class="btn-main" id="submit-btn">
                <span>Авторизовать терминал</span> <span>↗</span>
            </button>
        </form>
    </div>
</div>

<!-- ГЛАВНЫЙ ИНТЕРФЕЙС -->
<div id="main-hub">
    <nav class="hub-nav">
        <h2 class="nav-logo">IZUNAX // SYSTEM</h2>
        <div class="nav-links">
            <button class="nav-btn active" id="btn-tab-feed" onclick="switchTab('feed')">Лента</button>
            <button class="nav-btn" id="btn-tab-profile" onclick="switchTab('profile')">Статус системы</button>
        </div>
    </nav>
    
    <div class="hub-container">
        <!-- Вкладка ленты -->
        <div id="feed-view-container">
            <div class="section-title"><span>/01</span> SELECTED_WORK // ЖИВОЙ ПОТОК ДАННЫХ</div>
            <div id="feed-view" class="feed-grid"></div>
        </div>
        
        <!-- Вкладка профиля -->
        <div id="profile-view" style="display: none;">
            <div class="section-title"><span>/02</span> SYSTEM_STATUS // ДАННЫЕ ОПЕРАТОРА</div>
            <div class="profile-container">
                <div class="status-row">
                    <span class="status-label">Оператор</span>
                    <span class="status-value" id="p-login"></span>
                </div>
                <div class="status-row">
                    <span class="status-label">Канал связи</span>
                    <span class="status-value" id="p-email"></span>
                </div>
                <div class="status-row">
                    <span class="status-label">Фракция</span>
                    <span class="status-value" id="p-faction"></span>
                </div>
                <div class="status-row">
                    <span class="status-label">Статус ядра</span>
                    <span class="status-value" id="p-bio"></span>
                </div>
                <div class="status-row">
                    <span class="status-label">База данных XP</span>
                    <span class="status-value" id="p-xp" style="color: var(--cyber-cyan);"></span>
                </div>
                
                <div style="display: flex; gap: 20px; align-items: center;">
                    <a href="publish.html" class="action-link">Создать публикацию &nbsp;&nbsp; ↗</a>
                    <button onclick="localStorage.removeItem('izunax_user'); location.reload();" class="btn-main" style="background: transparent; border: 1px solid #ef4444; color: #ef4444; max-width: 150px; padding: 13px; font-size: 12px; margin-top: 30px;">Сбросить сессию</button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="zebra-footer"></div>
</div>

<script src="izunax-extras.js"></script>
<script src="gaming.js"></script>
</body>
</html>
