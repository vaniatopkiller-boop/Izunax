<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZUNAX | Gaming Hub & Profile</title>
    <!-- Используем правильные CDN для старой версии SDK, которая у тебя в проекте -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        body { background-color: #0b0c10; color: #c5c6c7; font-family: sans-serif; padding: 20px; }
        .card { background: #1f2833; border: 1px solid #45f3ff; border-radius: 8px; padding: 20px; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #66fcf1; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0b0c10; border: 1px solid #45f3ff; color: #fff; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { background: #66fcf1; color: #000; border: none; padding: 12px 20px; width: 100%; font-weight: bold; cursor: pointer; }
        #error-monitor { margin-top: 20px; padding: 10px; background: #500; color: #fff; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Регистрация игрового профиля</h2>
    <form id="mega-game-form">
        <div class="form-group">
            <label>Логин</label>
            <input type="text" id="game-login" required>
        </div>
        <div class="form-group">
            <label>Gmail</label>
            <input type="email" id="game-email" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="game-password" required>
        </div>
        <div class="form-group">
            <label>Фракция</label>
            <select id="game-faction">
                <option value="Shadow Syndicate">Shadow Syndicate</option>
                <option value="Cyber Warriors">Cyber Warriors</option>
            </select>
        </div>
        <button type="submit" class="btn-submit">Сохранить в Firebase</button>
    </form>

    <!-- Монитор ошибок -->
    <div id="error-monitor"></div>
</div>

<script>
    // Проверяем, загрузился ли конфиг и база данных
    setTimeout(() => {
        const monitor = document.getElementById('error-monitor');
        if (!window.db) {
            monitor.style.display = 'block';
            monitor.innerText = "КРИТИЧЕСКАЯ ОШИБКА: window.db не найден! Проверь, правильно ли подключен firebase-config.js";
        }
    }, 2000);

    document.getElementById('mega-game-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const monitor = document.getElementById('error-monitor');
        monitor.style.display = 'none';

        const login = document.getElementById('game-login').value;
        const email = document.getElementById('game-email').value;
        const password = document.getElementById('game-password').value;
        const faction = document.getElementById('game-faction').value;

        if (!window.db) {
            alert("Ошибка: База данных не инициализирована.");
            return;
        }

        // Пробуем отправить данные
        window.db.collection("game_accounts").add({
            game_login: login,
            gmail: email,
            password: password,
            faction: faction,
            createdAt: new Date()
        })
        .then((docRef) => {
            alert('Успех! Данные в базе. ID: ' + docRef.id);
            location.reload(); // Перезагрузим, чтобы увидеть обновления
        })
        .catch((error) => {
            console.error(error);
            monitor.style.display = 'block';
            monitor.innerText = "Ошибка Firebase Firestore: " + error.message;
        });
    });
</script>

</body>
</html>
