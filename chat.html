<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZUNAX — Чат</title>
   <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff3366">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
     <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        :root { --bg:#0a0a0f;--bg2:#0f0f1a;--red:#ff3366;--red-dim:rgba(255,51,102,0.3);--purple:#8b00ff;--text:#e8e0f0;--text-dim:#888;--text-faint:#555;--border:rgba(255,255,255,0.06);--card:rgba(15,15,20,0.9);--input:#1a1a1a; }
        .theme-light { --bg:#f5f5f5;--bg2:#fff;--text:#1a1a1a;--text-dim:#666;--text-faint:#999;--border:rgba(0,0,0,0.08);--card:rgba(255,255,255,0.95);--input:#f0f0f0; }
        .theme-purple { --bg:#0d001a;--bg2:#15002e;--red:#bb00ff;--text:#e8d0ff;--text-dim:#9a7abf;--text-faint:#5a3a7f;--border:rgba(187,0,255,0.1);--card:rgba(21,0,46,0.95);--input:#1a0030; }
        .theme-green { --bg:#001a0a;--bg2:#002e15;--red:#00ff66;--text:#d0ffe0;--text-dim:#7abf9a;--text-faint:#3a7f5a;--border:rgba(0,255,102,0.1);--card:rgba(0,46,21,0.95);--input:#00301a; }
        .theme-gold { --bg:#1a1500;--bg2:#2e2500;--red:#ffd700;--text:#ffe8a0;--text-dim:#bfa060;--text-faint:#7f6a30;--border:rgba(255,215,0,0.1);--card:rgba(46,37,0,0.95);--input:#302800; }
        .theme-blue { --bg:#000a1a;--bg2:#00152e;--red:#0099ff;--text:#d0e8ff;--text-dim:#7ab0bf;--text-faint:#3a607f;--border:rgba(0,153,255,0.1);--card:rgba(0,21,46,0.95);--input:#001830; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; min-height:100vh; transition:all 0.3s; }
        .header { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(10,10,15,0.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
        .header-inner { max-width:1200px; margin:0 auto; padding:0 20px; height:60px; display:flex; align-items:center; gap:12px; }
        .logo { text-decoration:none; display:flex; align-items:baseline; gap:4px; }
        .logo-ix { font-family:'Cinzel',serif; font-size:1.3rem; font-weight:900; color:var(--red); }
        .logo-full { font-family:'Cinzel',serif; font-size:0.9rem; font-weight:700; color:var(--text-dim); letter-spacing:2px; }
        .nav { margin-left:auto; display:flex; align-items:center; gap:6px; }
        .nav a { color:var(--text-dim); text-decoration:none; font-weight:600; letter-spacing:1px; padding:6px 10px; font-size:13px; text-transform:uppercase; }
        .nav a:hover { color:var(--text); }
        .main { max-width:700px; margin:80px auto 30px; padding:0 15px; }
        .chat-box { background:var(--card); border:1px solid var(--border); border-radius:16px; height:70vh; display:flex; flex-direction:column; overflow:hidden; }
        .chat-header { padding:12px 16px; border-bottom:1px solid var(--border); font-family:'Cinzel',serif; font-weight:700; letter-spacing:2px; text-align:center; }
        .chat-msgs { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:6px; }
        .msg { max-width:75%; padding:8px 12px; border-radius:12px; font-size:13px; display:flex; gap:6px; align-items:flex-start; }
        .msg.mine { align-self:flex-end; background:rgba(255,51,102,0.15); border:1px solid var(--red-dim); flex-direction:row-reverse; }
        .msg.theirs { align-self:flex-start; background:var(--bg2); border:1px solid var(--border); }
        .msg-avatar { width:26px; height:26px; border-radius:50%; background:var(--bg3); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--red); }
        .msg-author { font-size:10px; color:var(--red); font-weight:600; }
        .chat-input-wrap { display:flex; gap:8px; padding:12px; border-top:1px solid var(--border); }
        .chat-input { flex:1; padding:10px; background:var(--input); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'Rajdhani',sans-serif; }
        .btn { padding:10px 20px; border-radius:10px; font-weight:700; cursor:pointer; font-family:'Rajdhani',sans-serif; border:none; background:linear-gradient(90deg,var(--purple),var(--red)); color:#fff; }
    </style>
</head>
<body>
<header class="header"><div class="header-inner">
    <a href="index.html" class="logo"><span class="logo-ix">IX</span><span class="logo-full">IZUNAX</span></a>
    <nav class="nav">
        <a href="gallery.html">Галерея</a>
        <a href="chat.html" style="color:var(--red);">💬Чат</a>
        <a href="messages.html">✉ЛС</a>
        <a href="bookmarks.html">⭐</a>
        <a href="profile.html" id="navProfile" style="display:none">Профіль</a>
        <a href="login.html" id="navLogin">Увійти</a>
        <a href="#" onclick="doLogout()" id="navLogout" style="display:none;color:#ff4444;">Вийти</a>
    </nav>
</div></header>
<main class="main">
    <div class="chat-box">
        <div class="chat-header">💬 Загальний чат IZUNAX</div>
        <div class="chat-msgs" id="chatMsgs">Завантаження...</div>
        <div class="chat-input-wrap">
            <input class="chat-input" id="msgInput" placeholder="Повідомлення...">
            <button class="btn" onclick="sendMsg()">➤</button>
        </div>
    </div>
</main>
<script type="module">
import { auth, db, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp, onAuthStateChanged } from "./firebase-auth.js";
const t=localStorage.getItem('izunax_theme')||'dark'; document.body.classList.toggle('theme-light',t==='light'); document.body.classList.toggle('theme-purple',t==='purple'); document.body.classList.toggle('theme-green',t==='green'); document.body.classList.toggle('theme-gold',t==='gold'); document.body.classList.toggle('theme-blue',t==='blue');
let currentUser=null;
window.doLogout=()=>{auth.signOut();window.location.href='login.html';};
onAuthStateChanged(auth,u=>{
    if(!u){window.location.href='login.html';return;}
    currentUser=u; document.getElementById('navLogin').style.display='none'; document.getElementById('navProfile').style.display=''; document.getElementById('navLogout').style.display='';
    loadMsgs(); setInterval(loadMsgs,3000);
});
async function loadMsgs(){
    const snap=await getDocs(query(collection(db,'chat_messages'),orderBy('createdAt','asc'),limit(100)));
    const msgs=[]; snap.forEach(d=>msgs.push(d.data()));
    const c=document.getElementById('chatMsgs');
    c.innerHTML=msgs.map(m=>`<div class="msg ${m.authorUid===currentUser?.uid?'mine':'theirs'}"><div class="msg-avatar">${(m.authorName||'?')[0]}</div><div><div class="msg-author">${m.authorName||'Анонім'}</div>${m.text}<br><small style="color:var(--text-faint);">${m.createdAt?.seconds?new Date(m.createdAt.seconds*1000).toLocaleTimeString():''}</small></div></div>`).join('');
    c.scrollTop=c.scrollHeight;
}
window.sendMsg=async()=>{
    const inp=document.getElementById('msgInput'); const t=inp.value.trim(); if(!t)return;
    await addDoc(collection(db,'chat_messages'),{authorUid:currentUser.uid,authorName:currentUser.displayName||'User',text:t,createdAt:serverTimestamp()});
    inp.value=''; loadMsgs();
};
</script>
<script src="lang.js"></script>
</body>
</html>
