<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZUNAX | Создать Пост</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { 
            background: #05050a; color: #c5c6c7; font-family: 'Courier New', monospace; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
        }
        .admin-box {
            background: #0f111a; border: 1px solid #f0f; padding: 30px; width: 100%; max-width: 500px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
        }
        h1 { text-align: center; color: #f0f; text-shadow: 0 0 10px #f0f; text-transform: uppercase; margin-top: 0; }
        input, textarea { 
            width: 100%; padding: 12px; background: #000; color: #fff; 
            border: 1px solid #1a1e2d; margin-bottom: 15px; box-sizing: border-box; font-family: inherit;
        }
        input:focus, textarea:focus { border-color: #f0f; outline: none; box-shadow: 0 0 10px rgba(255, 0, 255, 0.3); }
        .btn-publish {
            width: 100%; padding: 14px; background: transparent; border: 2px solid #f0f;
            color: #f0f; font-weight: bold; cursor: pointer; text-transform: uppercase; font-family: inherit;
        }
        .btn-publish:hover { background: #f0f; color: #000; box-shadow: 0 0 20px #f0f; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #0ff; text-decoration: none; font-size: 14px; }
        .user-indicator { text-align: center; color: #888; font-size: 12px; margin-bottom: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="admin-box">
    <h1>Создать публикацию</h1>
    <div class="user-indicator" id="user-display">Авторизация...</div>
    <form id="post-form">
        <input type="text" id="post-title" placeholder="Заголовок новости" required>
        <textarea id="post-text" rows="5" placeholder="Текст публикации... Каждая запись дает +10 XP" required></textarea>
        
        <button type="submit" class="btn-publish">Выгрузить в подсеть</button>
    </form>
    <a href="gaming.html" class="back-link">← Вернуться в терминал</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAY58C_0NckfmkNHLsoB_eeKPcsBuB-W04",
        authDomain: "izunax-c1707.firebaseapp.com",
        projectId: "izunax-c1707",
        storageBucket: "izunax-c1707.firebasestorage.app",
        messagingSenderId: "755797664743",
        appId: "1:755797664743:web:2eaeff896c9df27075d342"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const localDb = firebase.firestore();

    // Проверка авторизации сессии
    const user = JSON.parse(localStorage.getItem("izunax_user"));
    if (!user) {
        alert("Сбой доступа: Для публикации постов авторизуйте терминал!");
        window.location.href = "gaming.html";
    } else {
        document.getElementById('user-display').innerText = "Оператор: " + user.login;
    }

    document.getElementById('post-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const title = document.getElementById('post-title').value;
        const text = document.getElementById('post-text').value;

        const postData = {
            author: user.login,
            title: title,
            text: text,
            createdAt: new Date()
        };

        // 1. Создаем пост
        localDb.collection("hub_posts").add(postData)
        .then(() => {
            // 2. Ищем аккаунт автора для начисления опыта
            return localDb.collection("game_accounts").where("email", "==", user.email).get();
        })
        .then((snapshot) => {
            if (!snapshot.empty) {
                const doc = snapshot.docs[0];
                const newXp = (doc.data().xp || 0) + 10;
                
                // Обновляем данные сессии
                user.xp = newXp;
                localStorage.setItem("izunax_user", JSON.stringify(user));
                
                // Обновляем базу данных
                return localDb.collection("game_accounts").doc(doc.id).update({ xp: newXp });
            }
        })
        .then(() => {
            alert("Данные ретранслированы! Начислено +10 XP.");
            window.location.href = "gaming.html";
        })
        .catch((err) => {
            alert("Критический сбой отправки пакета: " + err.message);
        });
    });
</script>

</body>
</html>
