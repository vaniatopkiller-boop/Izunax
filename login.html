<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZUNAX — Вхід</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0a0a0f; color:#fff;
            font-family:'Rajdhani',sans-serif;
            min-height:100vh; display:flex;
            align-items:center; justify-content:center;
            padding:20px;
        }
        .box {
            background:rgba(15,15,20,0.97); padding:40px 30px;
            border-radius:20px; border:1px solid #ff3366;
            max-width:380px; width:100%; text-align:center;
            box-shadow:0 0 50px rgba(255,51,102,0.15);
        }
        .logo {
            font-family:'Cinzel',serif; font-size:36px;
            background:linear-gradient(90deg,#ff3366,#bb00ff);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            margin-bottom:6px; letter-spacing:3px;
        }
        .subtitle { color:#888; margin-bottom:24px; font-size:14px; }
        .input-group { margin-bottom:12px; text-align:left; }
        .input-group label { display:block; font-size:12px; color:#888; margin-bottom:4px; letter-spacing:1px; text-transform:uppercase; }
        .input-group input {
            width:100%; padding:14px 16px;
            background:#1a1a1a; border:1px solid #333;
            border-radius:10px; color:#fff;
            font-family:'Rajdhani',sans-serif; font-size:15px;
            outline:none; transition:border 0.2s;
        }
        .input-group input:focus { border-color:#ff3366; }
        .btn {
            width:100%; padding:15px; border:none; border-radius:10px;
            font-size:16px; font-weight:700; cursor:pointer;
            font-family:'Rajdhani',sans-serif; margin-top:12px;
            transition:all 0.2s;
        }
        .btn-primary { background:linear-gradient(90deg,#8b00ff,#ff1432); color:#fff; }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(255,51,102,0.3); }
        .btn-google {
            background:#fff; color:#1a1a1a;
            display:flex; align-items:center; justify-content:center; gap:10px;
        }
        .btn-google:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(255,255,255,0.15); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        .divider {
            display:flex; align-items:center; gap:12px;
            margin:20px 0; color:#444; font-size:13px;
        }
        .divider::before,.divider::after { content:''; flex:1; height:1px; background:#333; }
        .error {
            color:#ff6666; margin-top:12px; font-size:13px;
            background:rgba(255,68,68,0.1); padding:12px;
            border-radius:10px; display:none;
        }
        .success {
            color:#66ff88; margin-top:12px; font-size:13px;
            background:rgba(68,255,100,0.1); padding:12px;
            border-radius:10px; display:none;
        }
        .link { color:#888; text-decoration:none; font-size:13px; display:inline-block; margin-top:16px; }
        .link:hover { color:#ff3366; }
    </style>
</head>
<body>

<div class="box">
    <div class="logo">IZUNAX</div>
    <p class="subtitle">Увійди в акаунт</p>

    <div class="input-group">
        <label>Нік</label>
        <input type="text" id="nickInput" placeholder="Твій нік" autocomplete="off">
    </div>

    <div class="input-group">
        <label>Пароль</label>
        <input type="password" id="passInput" placeholder="Пароль" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="loginBtn">Увійти</button>

    <div class="divider">або</div>

    <button class="btn btn-google" id="googleBtn">
        <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Увійти через Google
    </button>

    <div id="errorBox" class="error"></div>
    <div id="successBox" class="success"></div>

    <a href="register.html" class="link">Створити акаунт →</a>
    <br>
    <a href="index.html" class="link">← На головну</a>
</div>
<script type="module">
    import { auth, GoogleAuthProvider, signInWithPopup } from "./firebase-auth.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const auth2 = getAuth();
    const nickInput = document.getElementById('nickInput');
    const passInput = document.getElementById('passInput');
    const loginBtn = document.getElementById('loginBtn');
    const googleBtn = document.getElementById('googleBtn');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');

    function showError(msg) { errorBox.textContent = msg; errorBox.style.display = 'block'; }
    function showSuccess(msg) { successBox.textContent = msg; successBox.style.display = 'block'; }

    // Вхід по ніку
    loginBtn.addEventListener('click', async () => {
        const nick = nickInput.value.trim();
        const pass = passInput.value;
        errorBox.style.display = 'none';
        if (!nick) { showError('Введи нік'); return; }
        if (!pass) { showError('Введи пароль'); return; }
        loginBtn.disabled = true;
        loginBtn.textContent = 'Вхід...';
        try {
            const email = `${nick.toLowerCase()}@izunax.user`;
            await signInWithEmailAndPassword(auth2, email, pass);
            window.location.href = 'profile.html';
        } catch(e) {
            showError('Невірний нік або пароль');
            loginBtn.disabled = false;
            loginBtn.textContent = 'Увійти';
        }
    });

    // Вхід через Google
    googleBtn.addEventListener('click', async () => {
        googleBtn.disabled = true;
        googleBtn.textContent = 'Зачекай...';
        errorBox.style.display = 'none';
        try {
            const provider = new GoogleAuthProvider();
            await signInWithPopup(auth, provider);
            window.location.href = 'profile.html';
        } catch(e) {
            if (e.code !== 'auth/popup-closed-by-user') showError(e.message);
            googleBtn.disabled = false;
            googleBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Увійти через Google`;
        }
    });
</script>
<script src="lang.js"></script>
</body>
</html>
