<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H ARCHIVES - Авторизация</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/effects.css">
  <link rel="stylesheet" href="css/terminal.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-box {
      max-width: 420px;
      width: 100%;
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-logo .mark {
      display: inline-grid;
      place-items: center;
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(180deg, #d3161c, #7f090d);
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 10px;
      box-shadow: 0 10px 30px rgba(207,17,23,0.3);
    }
    .auth-logo h2 {
      font-family: var(--font-display);
      letter-spacing: 0.12em;
      font-size: 1.3rem;
    }
    .auth-logo p {
      color: var(--faint);
      font-size: 0.85rem;
      margin-top: 4px;
    }
    .auth-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 20px;
    }
    .auth-tab {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
      font-size: 0.85rem;
      text-align: center;
      font-family: var(--font-ui);
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: rgba(207,17,23,0.15);
      border-color: rgba(207,17,23,0.35);
      color: #ff9093;
    }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: var(--faint);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }
    .btn-google {
      width: 100%;
      padding: 12px;
      background: #fff;
      color: #1a1a1a;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.2s;
    }
    .btn-google:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(255,255,255,0.1); }
    .msg-box {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.85rem;
      display: none;
    }
    .msg-box.error { display: block; background: rgba(244,67,54,0.1); color: #ff6666; }
    .msg-box.success { display: block; background: rgba(76,175,80,0.1); color: #66ff88; }
    .auth-links {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
    }
    .auth-links a { color: var(--muted); }
    .auth-links a:hover { color: #ff7a7f; }
    .reset-link {
      display: block;
      text-align: right;
      font-size: 0.8rem;
      color: var(--faint);
      margin-top: 6px;
      cursor: pointer;
    }
    .reset-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <canvas id="noise"></canvas>
  <div class="overlay scanlines"></div>
  <div class="overlay vignette"></div>

  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        <div class="mark">H</div>
        <h2>H ARCHIVES</h2>
        <p>Система авторизации организации Н</p>
      </div>

      <div class="terminal-window">
        <div class="terminal-header">
          <div class="terminal-dots"><span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span></div>
          <div class="terminal-title">AUTH-TERMINAL</div>
        </div>

        <div style="padding: 20px;">
          <div class="auth-tabs">
            <button class="auth-tab active" data-panel="login">Вход</button>
            <button class="auth-tab" data-panel="register">Регистрация</button>
          </div>

          <!-- Login panel -->
          <div class="auth-panel active" id="loginPanel">
            <form id="loginForm">
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="loginEmail" placeholder="operator@h-archives.org" required autocomplete="email">
              </div>
              <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" class="form-input" id="loginPass" placeholder="Пароль" required autocomplete="current-password">
              </div>
              <a class="reset-link" id="resetLink">Забыли пароль?</a>
              <button type="submit" class="btn btn-primary btn-full" style="margin-top:14px;">Войти в систему</button>
            </form>
          </div>

          <!-- Register panel -->
          <div class="auth-panel" id="registerPanel">
            <form id="registerForm">
              <div class="form-group">
                <label class="form-label">Позывной</label>
                <input type="text" class="form-input" id="regName" placeholder="Ваш позывной" required autocomplete="name" maxlength="30">
              </div>
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="regEmail" placeholder="email@example.com" required autocomplete="email">
              </div>
              <div class="form-group">
                <label class="form-label">Пароль (мин. 6 символов)</label>
                <input type="password" class="form-input" id="regPass" placeholder="Пароль" required autocomplete="new-password" minlength="6">
              </div>
              <div class="form-group">
                <label class="form-label">Подтверждение пароля</label>
                <input type="password" class="form-input" id="regPass2" placeholder="Повторите пароль" required autocomplete="new-password">
              </div>
              <button type="submit" class="btn btn-primary btn-full" style="margin-top:14px;">Зарегистрироваться</button>
            </form>
          </div>

          <div id="msgBox" class="msg-box"></div>

          <div class="divider">или</div>

          <button class="btn-google" id="googleBtn">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.07 5.07 0 01-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Войти через Google
          </button>

          <div class="auth-links">
            <a href="index.html">&larr; На главную</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initNoise, initGlitch, initCRTFlicker } from "./js/effects.js";
    import { loginWithEmail, registerWithEmail, loginWithGoogle, resetPassword } from "./js/auth.js";

    initNoise("noise");
    initCRTFlicker();

    const tabs = document.querySelectorAll(".auth-tab");
    const panels = document.querySelectorAll(".auth-panel");
    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        panels.forEach(p => p.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(tab.dataset.panel + "Panel").classList.add("active");
        hideMsg();
      });
    });

    function showMsg(text, type) {
      const box = document.getElementById("msgBox");
      box.textContent = text;
      box.className = "msg-box " + type;
    }
    function hideMsg() {
      const box = document.getElementById("msgBox");
      box.className = "msg-box";
      box.textContent = "";
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideMsg();
      const email = document.getElementById("loginEmail").value.trim();
      const pass = document.getElementById("loginPass").value;
      try {
        await loginWithEmail(email, pass);
        showMsg("Доступ разрешён. Перенаправление...", "success");
        setTimeout(() => window.location.href = "archive.html", 800);
      } catch (err) {
        showMsg(translateError(err.code), "error");
      }
    });

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideMsg();
      const name = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const pass = document.getElementById("regPass").value;
      const pass2 = document.getElementById("regPass2").value;
      if (pass !== pass2) { showMsg("Пароли не совпадают", "error"); return; }
      if (pass.length < 6) { showMsg("Пароль минимум 6 символов", "error"); return; }
      try {
        await registerWithEmail(email, pass, name);
        showMsg("Аккаунт создан. Перенаправление...", "success");
        setTimeout(() => window.location.href = "archive.html", 800);
      } catch (err) {
        showMsg(translateError(err.code), "error");
      }
    });

    document.getElementById("googleBtn").addEventListener("click", async () => {
      hideMsg();
      try {
        await loginWithGoogle();
        showMsg("Доступ разрешён. Перенаправление...", "success");
        setTimeout(() => window.location.href = "archive.html", 800);
      } catch (err) {
        showMsg(translateError(err.code), "error");
      }
    });

    document.getElementById("resetLink").addEventListener("click", async () => {
      const email = document.getElementById("loginEmail").value.trim();
      if (!email) { showMsg("Введите email для восстановления", "error"); return; }
      try {
        await resetPassword(email);
        showMsg("Письмо для восстановления отправлено", "success");
      } catch (err) {
        showMsg(translateError(err.code), "error");
      }
    });

    function translateError(code) {
      const map = {
        "auth/invalid-email": "Некорректный email",
        "auth/user-not-found": "Пользователь не найден",
        "auth/wrong-password": "Неверный пароль",
        "auth/email-already-in-use": "Email уже используется",
        "auth/weak-password": "Слишком слабый пароль",
        "auth/too-many-requests": "Слишком много попыток. Попробуйте позже",
        "auth/popup-closed-by-user": "Окно авторизации закрыто",
        "auth/invalid-credential": "Неверные учётные данные",
      };
      return map[code] || "Ошибка авторизации: " + code;
    }
  </script>
</body>
</html>
