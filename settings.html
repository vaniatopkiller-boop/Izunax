<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZUNAX — Налаштування</title>
    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff3366">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
        :root { --bg:#0a0a0f;--bg2:#0f0f1a;--red:#ff3366;--red-dim:rgba(255,51,102,0.3);--purple:#8b00ff;--text:#e8e0f0;--text-dim:#888;--text-faint:#555;--border:rgba(255,255,255,0.06);--card:rgba(15,15,20,0.9);--input:#1a1a1a; }
        .theme-light { --bg:#f5f5f5;--bg2:#fff;--text:#1a1a1a;--text-dim:#666;--text-faint:#999;--border:rgba(0,0,0,0.08);--card:rgba(255,255,255,0.95);--input:#f0f0f0; }
        .theme-purple { --bg:#0d001a;--bg2:#15002e;--red:#bb00ff;--text:#e8d0ff;--text-dim:#9a7abf;--text-faint:#5a3a7f;--border:rgba(187,0,255,0.1);--card:rgba(21,0,46,0.95);--input:#1a0030; }
        .theme-green { --bg:#001a0a;--bg2:#002e15;--red:#00ff66;--text:#d0ffe0;--text-dim:#7abf9a;--text-faint:#3a7f5a;--border:rgba(0,255,102,0.1);--card:rgba(0,46,21,0.95);--input:#00301a; }
        .theme-gold { --bg:#1a1500;--bg2:#2e2500;--red:#ffd700;--text:#ffe8a0;--text-dim:#bfa060;--text-faint:#7f6a30;--border:rgba(255,215,0,0.1);--card:rgba(46,37,0,0.95);--input:#302800; }
        .theme-blue { --bg:#000a1a;--bg2:#00152e;--red:#0099ff;--text:#d0e8ff;--text-dim:#7ab0bf;--text-faint:#3a607f;--border:rgba(0,153,255,0.1);--card:rgba(0,21,46,0.95);--input:#001830; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; min-height:100vh; transition:all 0.3s; }
        .header { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(10,10,15,0.9); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
        .header-inner { max-width:1200px; margin:0 auto; padding:0 20px; height:60px; display:flex; align-items:center; gap:12px; }
        .logo { text-decoration:none; display:flex; align-items:baseline; gap:4px; }
        .logo-ix { font-family:'Cinzel',serif; font-size:1.3rem; font-weight:900; color:var(--red); }
        .logo-full { font-family:'Cinzel',serif; font-size:0.9rem; font-weight:700; color:var(--text-dim); letter-spacing:2px; }
        .nav { margin-left:auto; display:flex; align-items:center; gap:6px; }
        .nav a { color:var(--text-dim); text-decoration:none; font-weight:600; letter-spacing:1px; padding:6px 10px; font-size:13px; text-transform:uppercase; }
        .nav a:hover { color:var(--text); }
        .main { max-width:600px; margin:80px auto 40px; padding:0 20px; }
        .title { font-family:'Cinzel',serif; font-size:1.8rem; letter-spacing:3px; text-align:center; margin-bottom:25px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:16px; }
        .card-title { font-family:'Cinzel',serif; font-size:1.2rem; letter-spacing:2px; margin-bottom:16px; }
        .theme-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
        .theme-opt { padding:20px 12px; border-radius:12px; cursor:pointer; text-align:center; border:2px solid var(--border); font-weight:600; font-size:13px; letter-spacing:1px; transition:all 0.2s; }
        .theme-opt:hover { transform:translateY(-2px); }
        .theme-opt.active { border-color:var(--red); box-shadow:0 0 20px var(--red-dim); }
        .setting-row { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); }
        .setting-row h4 { font-size:15px; }
        .setting-row p { font-size:12px; color:var(--text-dim); }
        .toggle { position:relative; width:48px; height:26px; flex-shrink:0; }
        .toggle input { opacity:0; width:0; height:0; }
        .toggle-slider { position:absolute; inset:0; background:var(--bg3); border:1px solid var(--border); border-radius:26px; cursor:pointer; transition:0.3s; }
        .toggle-slider::before { content:''; position:absolute; width:20px; height:20px; left:2px; bottom:2px; background:var(--text-dim); border-radius:50%; transition:0.3s; }
        .toggle input:checked+.toggle-slider { background:rgba(255,51,102,0.2); border-color:var(--red); }
        .toggle input:checked+.toggle-slider::before { background:var(--red); transform:translateX(22px); }
        .btn { padding:10px 24px; border-radius:10px; font-weight:700; cursor:pointer; font-family:'Rajdhani',sans-serif; border:none; font-size:14px; text-transform:uppercase; }
        .btn-primary { background:linear-gradient(90deg,var(--purple),var(--red)); color:#fff; }
        .btn-danger { background:transparent; border:1px solid #ff4444; color:#ff4444; }
    </style>
</head>
<body>
<header class="header"><div class="header-inner">
    <a href="index.html" class="logo"><span class="logo-ix">IX</span><span class="logo-full">IZUNAX</span></a>
    <nav class="nav">
        <a href="gallery.html">Галерея</a><a href="chat.html">💬Чат</a><a href="messages.html">✉ЛС</a>
        <a href="bookmarks.html">⭐</a><a href="profile.html">Профіль</a>
        <a href="settings.html" style="color:var(--red);">⚙️</a>
        <a href="login.html" id="navLogin">Увійти</a>
        <a href="#" onclick="doLogout()" id="navLogout" style="display:none;color:#ff4444;">Вийти</a>
    </nav>
</div></header>
<main class="main">
    <h1 class="title">⚙️ Налаштування</h1>
    <div class="card">
        <div class="card-title">🎨 Тема</div>
        <div class="theme-grid" id="themeGrid">
            <div class="theme-opt active" data-theme="dark" onclick="setTheme('dark')" style="background:#0a0a0f;color:#e8e0f0;">🌑 Темна</div>
            <div class="theme-opt" data-theme="light" onclick="setTheme('light')" style="background:#f5f5f5;color:#1a1a1a;">☀️ Біла</div>
            <div class="theme-opt" data-theme="purple" onclick="setTheme('purple')" style="background:linear-gradient(135deg,#1a0030,#3d0066);color:#e8d0ff;">💜 Фіолет</div>
            <div class="theme-opt" data-theme="green" onclick="setTheme('green')" style="background:linear-gradient(135deg,#001a0a,#003d1a);color:#d0ffe0;">💚 Зелена</div>
            <div class="theme-opt" data-theme="gold" onclick="setTheme('gold')" style="background:linear-gradient(135deg,#1a1500,#4d3d00);color:#ffe8a0;">💛 Золота</div>
            <div class="theme-opt" data-theme="blue" onclick="setTheme('blue')" style="background:linear-gradient(135deg,#000a1a,#003366);color:#d0e8ff;">💙 Синя</div>
        </div>
    </div>
    <div class="card">
        <div class="card-title">🔐 Акаунт</div>
        <div class="setting-row"><div><h4>🔑 Запам'ятати мене</h4><p>Не виходити при закритті браузера</p></div><label class="toggle"><input type="checkbox" id="rememberToggle" checked onchange="toggleRemember()"><span class="toggle-slider"></span></label></div>
        <div class="setting-row"><div><h4>🔔 Сповіщення</h4><p>Лайки та коментарі</p></div><label class="toggle"><input type="checkbox" id="notifToggle" checked onchange="toggleNotif()"><span class="toggle-slider"></span></label></div>
    </div>
    <div class="card" style="border-color:rgba(255,68,68,0.3);">
        <div class="card-title" style="color:#ff4444;">⚠️ Небезпечна зона</div>
        <button class="btn btn-danger" onclick="clearData()">🗑 Очистити кеш</button>
    </div>
</main>
<script>
const t=localStorage.getItem('izunax_theme')||'dark';
document.body.classList.toggle('theme-light',t==='light'); document.body.classList.toggle('theme-purple',t==='purple'); document.body.classList.toggle('theme-green',t==='green'); document.body.classList.toggle('theme-gold',t==='gold'); document.body.classList.toggle('theme-blue',t==='blue');
document.querySelectorAll('.theme-opt').forEach(o=>o.classList.toggle('active',o.dataset.theme===t));
document.getElementById('rememberToggle').checked=localStorage.getItem('izunax_remember')!=='false';
document.getElementById('notifToggle').checked=localStorage.getItem('izunax_notifications')!=='false';
window.setTheme=t=>{
    document.body.classList.remove('theme-light','theme-purple','theme-green','theme-gold','theme-blue');
    if(t==='light')document.body.classList.add('theme-light'); if(t==='purple')document.body.classList.add('theme-purple'); if(t==='green')document.body.classList.add('theme-green'); if(t==='gold')document.body.classList.add('theme-gold'); if(t==='blue')document.body.classList.add('theme-blue');
    localStorage.setItem('izunax_theme',t); document.querySelectorAll('.theme-opt').forEach(o=>o.classList.toggle('active',o.dataset.theme===t));
};
window.toggleRemember=()=>{const v=document.getElementById('rememberToggle').checked;localStorage.setItem('izunax_remember',v);};
window.toggleNotif=()=>{const v=document.getElementById('notifToggle').checked;localStorage.setItem('izunax_notifications',v);};
window.clearData=()=>{if(confirm('Очистити кеш?')){const t=localStorage.getItem('izunax_theme');localStorage.clear();if(t)localStorage.setItem('izunax_theme',t);location.reload();}};
window.doLogout=()=>{localStorage.removeItem('izunax_auth_persist');window.location.href='login.html';};
</script>
</body>
</html>
