<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZUNAX — Секретний вхід</title>
   <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#ff3366">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
     <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Rajdhani:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a; color: #fff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            padding: 20px; position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(139,0,255,0.25), transparent 50%),
                        radial-gradient(circle at 50% 70%, rgba(255,20,50,0.2), transparent 50%);
            z-index: -1;
        }
        .container {
            background: rgba(15,15,20,0.97); padding: 50px 40px;
            border-radius: 20px; border: 2px solid #ff3366;
            max-width: 420px; width: 100%; text-align: center;
            box-shadow: 0 0 60px rgba(255,51,102,0.3);
            position: relative; z-index: 1;
        }
        .logo {
            font-family: 'Cinzel', serif; font-size: 42px;
            background: linear-gradient(90deg, #ff3366, #bb00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px; letter-spacing: 4px;
        }
        .lock-icon {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
        }
        .subtitle {
            color: #888; margin-bottom: 30px;
            font-size: 14px; letter-spacing: 2px;
            text-transform: uppercase;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-label {
            display: block;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            transition: all 0.2s;
            outline: none;
        }
        .input-field:focus {
            border-color: #ff3366;
            box-shadow: 0 0 20px rgba(255,51,102,0.2);
        }
        .input-field::placeholder {
            color: #555;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #8b00ff, #ff1432);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255,51,102,0.4);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .error {
            color: #ff6666;
            margin-top: 16px;
            font-size: 14px;
            background: rgba(255,68,68,0.1);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,68,68,0.3);
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #555;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
            letter-spacing: 1px;
        }
        .back-link:hover {
            color: #ff3366;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.6s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="container" id="loginContainer">
        <span class="lock-icon">🔐</span>
        <div class="logo">IZUNAX</div>
        <p class="subtitle">Адміністративний доступ</p>

        <div class="input-group">
            <label class="input-label">Логін</label>
            <input type="text" id="loginInput" class="input-field" placeholder="Введіть логін" autocomplete="off">
        </div>

        <div class="input-group">
            <label class="input-label">Пароль</label>
            <input type="password" id="passwordInput" class="input-field" placeholder="Введіть пароль" autocomplete="off">
        </div>

        <button class="login-btn" id="loginBtn">⚡ Увійти</button>

        <div id="error" class="error"></div>

        <a href="index.html" class="back-link">← На головну</a>
    </div>

    <script>
        const CORRECT_LOGIN = 'adam';
        const CORRECT_PASSWORD = 'adam_1_admin';

        const loginInput = document.getElementById('loginInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('error');
        const container = document.getElementById('loginContainer');

        // Функція перевірки
        function checkLogin() {
            const login = loginInput.value.trim();
            const password = passwordInput.value.trim();

            // Прибираємо попередню помилку
            errorDiv.style.display = 'none';
            container.classList.remove('shake');

            if (!login || !password) {
                showError('Будь ласка, заповніть усі поля');
                return;
            }

            if (login === CORRECT_LOGIN && password === CORRECT_PASSWORD) {
                // Успішний вхід
                loginBtn.textContent = '✓ Доступ дозволено';
                loginBtn.style.background = 'linear-gradient(90deg, #00aa44, #00cc66)';
                loginBtn.disabled = true;
                
                // Зберігаємо сесію адміна в sessionStorage
                sessionStorage.setItem('izunax_admin_auth', 'true');
                
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            } else {
                showError('❌ Невірний логін або пароль');
                container.classList.add('shake');
                
                // Очищаємо поля
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Обробник кнопки
        loginBtn.addEventListener('click', checkLogin);

        // Обробка Enter
        loginInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                passwordInput.focus();
            }
        });

        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                checkLogin();
            }
        });

        // Автофокус на поле логіна
        loginInput.focus();

        // Перевірка, чи вже авторизований
        if (sessionStorage.getItem('izunax_admin_auth') === 'true') {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
