<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H ARCHIVES - Инциденты</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/effects.css">
</head>
<body>
  <canvas id="noise"></canvas>
  <div class="overlay scanlines"></div>
  <div class="overlay vignette"></div>
  <div class="scanline-bar"></div>

  <header class="site-header">
    <a href="index.html" class="brand"><div class="brand-mark">H</div><div><div class="brand-title">H ARCHIVES</div><div class="brand-subtitle">СЕКРЕТНЫЙ АРХИВ</div></div></a>
    <nav class="nav">
      <a href="archive.html">Архив</a>
      <a href="documents.html">Документы</a>
      <a href="dossiers.html" >Досье</a>
      <a href="anomalies.html" >Аномалии</a>
      <a href="terminal.html">Терминал</a>
      <a href="search.html">Поиск</a>
      <a href="admin.html" data-auth="admin" class="hidden">Управление</a>
      <a href="profile.html" data-auth="only" class="hidden nav-btn">Профиль</a>
      <a href="login.html" data-auth="login" class="nav-auth-btn">Войти</a>
      <a href="#" data-auth="logout" class="hidden nav-btn" id="logoutBtn">Выйти</a>
    </nav>
    <button class="burger" id="burgerBtn"><span></span><span></span><span></span></button>
  </header>
  <nav class="mobile-nav" id="mobileNav">
    <a href="archive.html">Архив</a><a href="documents.html">Документы</a><a href="photos.html">Фотоархив</a>
    <a href="dossiers.html">Досье</a><a href="anomalies.html">Аномалии</a><a href="incidents.html">Инциденты</a>
    <a href="operations.html">Операции</a><a href="personnel.html">Персонал</a><a href="timeline.html">Хронология</a>
    <a href="admin.html" data-auth="admin" class="hidden">Управление</a>
    <a href="profile.html" data-auth="only" class="hidden">Профиль</a>
    <a href="login.html" data-auth="login">Войти</a>
    <a href="#" data-auth="logout" class="hidden" id="mobileLogoutBtn">Выйти</a>
  </nav>

  <main class="page-wrap">
    <div class="section-head">
      <div>
        <h1 class="section-title">&#128680; Инциденты</h1>
        <p class="section-subtitle">Отчёты об инцидентах и происшествиях</p>
      </div>
      <button class="btn btn-primary btn-sm hidden" data-auth="admin" id="createBtn">+ Создать</button>
    </div>

    <div class="filters-bar">
      <input type="text" class="form-input" id="searchInput" placeholder="Поиск...">
      <select class="form-select" id="statusFilter">
        <option value="">Все статусы</option>
        <option value="active">Активный</option>
        <option value="archived">В архиве</option>
        <option value="classified">Засекречен</option>
        <option value="declassified">Рассекречен</option>
        <option value="neutralized">Нейтрализован</option>
      </select>
    </div>

    <div class="grid-3" id="itemsGrid"><div class="loading-spinner"></div></div>
    <div id="modalContainer"></div>
    <button class="fab hidden" data-auth="admin" id="fabCreate" title="Создать запись">+</button>
  </main>

  <footer class="site-footer"><p>H ARCHIVES &copy; ОРГАНИЗАЦИЯ Н</p></footer>

  <script type="module">
    import { initApp, showToast, formatDate, getClearanceBadge, getStatusBadge, getCurrentProfile } from "./js/app.js";
    import { logout } from "./js/auth.js";
    import { getItems } from "./js/archive.js";
    import { openCreateForm } from "./js/create-forms.js";

    const TYPE = "incidents";
    initApp();

    document.getElementById("logoutBtn")?.addEventListener("click", async (e) => { e.preventDefault(); await logout(); showToast("Сессия завершена"); });
    document.getElementById("mobileLogoutBtn")?.addEventListener("click", async (e) => { e.preventDefault(); await logout(); showToast("Сессия завершена"); });

    let items = [];
    const grid = document.getElementById("itemsGrid");
    const modal = document.getElementById("modalContainer");

    async function load() {
      grid.innerHTML = '<div class="loading-spinner"></div>';
      try { items = await getItems(TYPE); render(); } catch(e) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">&#128450;</div><p>Не удалось загрузить данные</p></div>';
      }
    }

    function render() {
      const q = document.getElementById("searchInput").value.toLowerCase().trim();
      const st = document.getElementById("statusFilter").value;
      let f = items;
      if (q) f = f.filter(i => [i.title,i.description,i.body,i.code].filter(Boolean).join(" ").toLowerCase().includes(q));
      if (st) f = f.filter(i => i.status === st);
      if (!f.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">&#128450;</div><p>Записи не найдены</p></div>'; return; }
      grid.innerHTML = f.map(i => `
        <div class="archive-card fade-up" data-id="${i.id}">
          <div class="card-header"><span class="card-code">${i.code||"---"}</span>${getClearanceBadge(i.clearanceLevel||1)}</div>
          <div class="card-title">${i.title||"Без названия"}</div>
          <div class="card-desc">${i.description||i.body||""}</div>
          ${i.imageUrl?`<img src="${i.imageUrl}" style="width:100%;border-radius:8px;margin:8px 0;max-height:200px;object-fit:cover;" alt="">`:""}
          <div class="card-footer"><span>${formatDate(i.createdAt)}</span>${getStatusBadge(i.status||"active")}</div>
          ${(i.clearanceLevel||1)>=3?'<div class="stamp" style="right:-10px;bottom:14px;">СЕКРЕТНО</div>':""}
        </div>`).join("");
      grid.querySelectorAll(".archive-card").forEach(c => c.addEventListener("click", () => openDetail(c.dataset.id)));
    }

    function openDetail(id) {
      const i = items.find(x => x.id === id);
      if (!i) return;
      modal.innerHTML = `<div class="modal-overlay active" onclick="if(event.target===this)this.remove()"><div class="modal-card">
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&times;</button>
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
          <span style="font-family:var(--font-mono);color:var(--accent);letter-spacing:0.1em;">${i.code||"---"}</span>
          ${getClearanceBadge(i.clearanceLevel||1)} ${getStatusBadge(i.status||"active")}
        </div>
        <h2 style="font-family:var(--font-display);font-size:1.6rem;margin:10px 0;">${i.title||"Без названия"}</h2>
        <div style="color:var(--muted);line-height:1.8;margin:16px 0;">${i.body||i.description||"Содержимое отсутствует."}</div>
        ${i.imageUrl?`<img src="${i.imageUrl}" style="width:100%;border-radius:10px;margin:12px 0;">`:""}
        <div style="display:flex;gap:16px;align-items:center;margin-top:16px;flex-wrap:wrap;">
          <div class="stamp-circle">ОРГАНИЗАЦИЯ<br>Н</div>
          <div><div style="font-size:0.8rem;color:var(--faint);">Дата: ${formatDate(i.createdAt)}</div><div style="font-size:0.8rem;color:var(--faint);">Раздел: Инциденты</div></div>
        </div>
      </div></div>`;
    }

    document.getElementById("searchInput").addEventListener("input", render);
    document.getElementById("statusFilter").addEventListener("change", render);

    document.getElementById("createBtn")?.addEventListener("click", () => openCreateForm(TYPE, modal, load));

    load();
    document.getElementById("fabCreate")?.addEventListener("click", () => document.getElementById("createBtn")?.click());
  </script>
</body>
</html>
