<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZUNAX - Адмін панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-storage-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #f0f0f0;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #fff, #a970ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #121217; padding: 20px; border-radius: 16px; text-align: center; border: 1px solid #2a2a30; cursor: pointer; transition: 0.2s; }
        .stat-card:hover { background: #1a1a24; transform: translateY(-2px); }
        .stat-number { font-size: 2rem; font-weight: bold; color: #a970ff; }
        .stat-label { color: #888; margin-top: 8px; font-size: 0.85rem; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { background: #1e1e28; border: none; color: white; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .tab-btn.active, .tab-btn:hover { background: #8a6eff; }
        .tab-content { display: none; background: #121217; border-radius: 20px; padding: 20px; border: 1px solid #2a2a30; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; overflow-x: auto; display: block; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #2a2a30; font-size: 0.85rem; }
        th { color: #a970ff; }
        .btn { padding: 6px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.8rem; transition: 0.2s; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-primary { background: #8a6eff; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-sm { padding: 4px 10px; font-size: 0.75rem; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .search-box { background: #1e1e28; border: none; color: white; padding: 8px 15px; border-radius: 40px; width: 200px; margin-bottom: 15px; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #121217;
            padding: 25px;
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #1e1e28;
            border: none;
            color: white;
            border-radius: 8px;
        }
        .access-denied { text-align: center; padding: 60px 20px; }
        .admin-badge { background: #8a6eff; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; margin-left: 8px; }
        .title-badge { background: #f59e0b; padding: 2px 10px; border-radius: 20px; font-size: 0.7rem; margin-left: 8px; display: inline-block; }
        .event-card { background: #1e1e28; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .chat-message { background: #1e1e28; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            th, td { font-size: 0.7rem; padding: 6px; }
            .search-box { width: 100%; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="adminContent"><div style="text-align: center; padding: 60px;"><i class="fas fa-spinner fa-spin" style="font-size: 3rem;"></i><p>Перевірка доступу...</p></div></div>
    </div>

    <div id="userModal" class="modal"><div class="modal-content" id="userModalContent"></div></div>
    <div id="eventModal" class="modal"><div class="modal-content" id="eventModalContent"></div></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAY58C_0NckfmkNHLsoB_eeKPcsBuB-W04",
            authDomain: "izunax-c1707.firebaseapp.com",
            projectId: "izunax-c1707",
            storageBucket: "izunax-c1707.firebasestorage.app",
            messagingSenderId: "755797664743",
            appId: "1:755797664743:web:2eaeff896c9df27075d342"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore(), storage = firebase.storage(), provider = new firebase.auth.GoogleAuthProvider();
        
        const ALLOWED_ADMINS = ["vaniatopkiller@gmail.com", "zxc_angel@izunax.user"];
        function isAdmin(email) { return ALLOWED_ADMINS.includes(email); }
        
        let currentUser = null, usersData = [], postsData = [], commentsData = [], chatData = [], eventsData = [], homeSettings = null;
        async function checkAccess() {
            const content = document.getElementById("adminContent");
            if (!currentUser) {
                content.innerHTML = `<div class="access-denied"><i class="fas fa-lock"></i><h2>Потрібен вхід</h2><button class="btn btn-primary" onclick="login()"><i class="fab fa-google"></i> Увійти через Google</button><br><br><a href="index.html" style="color:#8a6eff;">← На головну</a></div>`;
                return false;
            }
            if (!isAdmin(currentUser.email)) {
                content.innerHTML = `<div class="access-denied"><i class="fas fa-shield-alt"></i><h2>Доступ заборонено</h2><p><small>Ваш email: ${currentUser.email}</small></p><button class="btn btn-primary" onclick="window.location.href='index.html'">На головну</button></div>`;
                return false;
            }
            return true;
        }
        
        function login() { auth.signInWithPopup(provider).then(() => location.reload()).catch(e => alert("Помилка: " + e.message)); }
        
        async function loadAllData() {
            const [usersSnap, postsSnap, commentsSnap, chatSnap, eventsSnap, homeSnap] = await Promise.all([
                db.collection("users").get(),
                db.collection("posts").get(),
                db.collection("comments").get(),
                db.collection("chat").orderBy("timestamp", "desc").limit(100).get(),
                db.collection("events").orderBy("date", "desc").get(),
                db.collection("settings").doc("homepage").get()
            ]);
            usersData = []; usersSnap.forEach(d => usersData.push({ id: d.id, ...d.data() }));
            postsData = []; postsSnap.forEach(d => postsData.push({ id: d.id, ...d.data() }));
            commentsData = []; commentsSnap.forEach(d => commentsData.push({ id: d.id, ...d.data() }));
            chatData = []; chatSnap.forEach(d => chatData.push({ id: d.id, ...d.data() }));
            eventsData = []; eventsSnap.forEach(d => eventsData.push({ id: d.id, ...d.data() }));
            homeSettings = homeSnap.exists ? homeSnap.data() : { heroText: "Твори. Без кордонів.", heroImage: "", eventTitle: "", eventDesc: "" };
            renderStats(); renderUsers(); renderPosts(); renderComments(); renderChat(); renderEvents(); renderHomeEditor();
        }
        
        function renderStats() {
            const statsHtml = `<div class="stats"><div class="stat-card" onclick="showTab('usersTab')"><div class="stat-number">${usersData.length}</div><div class="stat-label">👥 Користувачі</div></div>
                <div class="stat-card" onclick="showTab('postsTab')"><div class="stat-number">${postsData.length}</div><div class="stat-label">📷 Публікації</div></div>
                <div class="stat-card" onclick="showTab('commentsTab')"><div class="stat-number">${commentsData.length}</div><div class="stat-label">💬 Коментарі</div></div>
                <div class="stat-card" onclick="showTab('chatTab')"><div class="stat-number">${chatData.length}</div><div class="stat-label">💭 Повідомлення</div></div>
                <div class="stat-card" onclick="showTab('eventsTab')"><div class="stat-number">${eventsData.length}</div><div class="stat-label">🎉 Події</div></div>
                <div class="stat-card" onclick="showTab('homeTab')"><div class="stat-number"><i class="fas fa-edit"></i></div><div class="stat-label">Головна сторінка</div></div></div>`;
            document.getElementById("statsContainer").innerHTML = statsHtml;
        }
        
        function renderUsers() {
            const search = document.getElementById("userSearch")?.value.toLowerCase() || "";
            const filtered = usersData.filter(u => (u.name?.toLowerCase() || "").includes(search) || (u.email?.toLowerCase() || "").includes(search));
            let html = `<table><thead><tr><th>Аватар</th><th>Ім'я</th><th>Email</th><th>Титул</th><th>IP</th><th>Дата</th><th>Дії</th></tr></thead><tbody>`;
            filtered.forEach(user => {
                const isUserAdmin = isAdmin(user.email);
                html += `<tr>
                    <td><img class="user-avatar" src="${user.avatar || 'https://via.placeholder.com/40'}" onerror="this.src='https://via.placeholder.com/40'"></td>
                    <td>${user.name || "—"} ${isUserAdmin ? '<span class="admin-badge">Admin</span>' : ''}</td>
                    <td>${user.email || "—"}</td>
                    <td>${user.title ? `<span class="title-badge">${user.title}</span>` : "—"}</td>
                    <td>${user.lastIP || "—"}</td>
                    <td>${user.createdAt ? new Date(user.createdAt.toDate()).toLocaleDateString() : "—"}</td>
                    <td><button class="btn btn-primary btn-sm" onclick="editUser('${user.id}')"><i class="fas fa-edit"></i></button> ${!isUserAdmin ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${user.id}')"><i class="fas fa-trash"></i></button>` : ''}</td>
                </tr>`;
            });
            html += `</tbody> licensierad`;
            if (filtered.length === 0) html = "<p>Користувачів не знайдено</p>";
            document.getElementById("usersList").innerHTML = html;
        }
        
        async function editUser(userId) {
            const user = usersData.find(u => u.id === userId);
            const modal = document.getElementById("userModal");
            document.getElementById("userModalContent").innerHTML = `
                <h3><i class="fas fa-user-edit"></i> Редагування: ${user.name || user.email}</h3>
                <label>Ім'я:</label><input type="text" id="editName" value="${user.name || ''}">
                <label>Титул (наприклад: "Майстер пензля", "Срібний автор"):</label><input type="text" id="editTitle" value="${user.title || ''}" placeholder="Введіть титул">
                <label>Біографія:</label><textarea id="editBio" rows="3">${user.bio || ''}</textarea>
                <label>Додати IP (для відстеження):</label><input type="text" id="editIP" value="${user.lastIP || ''}" placeholder="IP адреса">
                <label>Роль:</label><select id="editRole"><option value="user" ${!user.isSpecial ? 'selected' : ''}>Звичайний</option><option value="special" ${user.isSpecial ? 'selected' : ''}>Особливий</option></select>
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button class="btn btn-success" onclick="saveUser('${userId}')">💾 Зберегти</button>
                    <button class="btn btn-warning" onclick="closeModal('userModal')">Скасувати</button>
                </div>`;
            modal.style.display = "flex";
        }
        
        async function saveUser(userId) {
            const name = document.getElementById("editName")?.value;
            const title = document.getElementById("editTitle")?.value;
            const bio = document.getElementById("editBio")?.value;
            const lastIP = document.getElementById("editIP")?.value;
            const role = document.getElementById("editRole")?.value;
            await db.collection("users").doc(userId).update({ name, title, bio, lastIP, isSpecial: role === "special" });
            alert("Дані користувача оновлено!");
            closeModal("userModal");
            loadAllData();
        }
        function renderPosts() {
            const search = document.getElementById("postSearch")?.value.toLowerCase() || "";
            const filtered = postsData.filter(p => (p.text?.toLowerCase() || "").includes(search));
            let html = `<table><thead><tr><th>Фото</th><th>Текст</th><th>Автор</th><th>Дата</th><th>Дії</th></tr></thead><tbody>`;
            filtered.forEach(post => {
                const author = usersData.find(u => u.id === post.userId);
                html += `<tr><td>${post.imageUrl ? `<i class="fas fa-image"></i>` : "—"}</td><td>${(post.text || "").substring(0, 50)}</td><td>${author?.name || "Невідомий"}</td><td>${post.createdAt ? new Date(post.createdAt.toDate()).toLocaleString() : "—"}</td><td><button class="btn btn-danger btn-sm" onclick="deletePost('${post.id}')">Видалити</button></td></tr>`;
            });
            html += `</tbody><tr>`;
            if (filtered.length === 0) html = "<p>Постів не знайдено</p>";
            document.getElementById("postsList").innerHTML = html;
        }
        
        function renderComments() {
            let html = `<div style="max-height:400px; overflow-y:auto;">`;
            commentsData.forEach(c => {
                const author = usersData.find(u => u.id === c.userId);
                html += `<div class="chat-message"><strong>${author?.name || "Користувач"}:</strong> ${c.text}<br><small style="color:#888;">${c.createdAt ? new Date(c.createdAt.toDate()).toLocaleString() : ""}</small></div>`;
            });
            html += `</div>`;
            if(commentsData.length === 0) html = "<p>Немає коментарів</p>";
            document.getElementById("commentsList").innerHTML = html;
        }
        
        function renderChat() {
            let html = `<div style="max-height:400px; overflow-y:auto;">`;
            chatData.forEach(m => {
                const author = usersData.find(u => u.id === m.userId);
                html += `<div class="chat-message"><strong>${author?.name || "Користувач"}:</strong> ${m.text}<br><small style="color:#888;">${m.timestamp ? new Date(m.timestamp.toDate()).toLocaleString() : ""}</small></div>`;
            });
            html += `</div>`;
            if(chatData.length === 0) html = "<p>Немає повідомлень у чаті</p>";
            document.getElementById("chatList").innerHTML = html;
        }
        
        function renderEvents() {
            let html = `<button class="btn btn-success" onclick="showEventModal()"><i class="fas fa-plus"></i> Створити подію</button><div style="margin-top:20px;">`;
            eventsData.forEach(e => {
                html += `<div class="event-card"><h3><i class="fas fa-calendar-alt"></i> ${e.title}</h3><p>${e.description || ""}</p>${e.imageUrl ? `<img src="${e.imageUrl}" style="max-width:100%; border-radius:12px; margin-top:10px;">` : ""}<br><small>Дата: ${e.date || "не вказано"}</small><br><button class="btn btn-danger btn-sm" onclick="deleteEvent('${e.id}')">Видалити</button></div>`;
            });
            html += `</div>`;
            if(eventsData.length === 0) html += "<p>Немає подій. Створіть першу!</p>";
            document.getElementById("eventsList").innerHTML = html;
        }
        
        function showEventModal() {
            const modal = document.getElementById("eventModal");
            document.getElementById("eventModalContent").innerHTML = `
                <h3><i class="fas fa-plus-circle"></i> Нова подія</h3>
                <label>Назва події:</label><input type="text" id="eventTitle" placeholder="Перший день літа">
                <label>Опис:</label><textarea id="eventDesc" rows="3" placeholder="Опис події..."></textarea>
                <label>Дата:</label><input type="date" id="eventDate">
                <label>Фото (URL або завантажте):</label><input type="file" id="eventImage" accept="image/*">
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button class="btn btn-success" onclick="saveEvent()">💾 Зберегти</button>
                    <button class="btn btn-warning" onclick="closeModal('eventModal')">Скасувати</button>
                </div>`;
            modal.style.display = "flex";
        }
        
        async function saveEvent() {
            const title = document.getElementById("eventTitle")?.value;
            const description = document.getElementById("eventDesc")?.value;
            const date = document.getElementById("eventDate")?.value;
            const file = document.getElementById("eventImage")?.files[0];
            let imageUrl = "";
            if(file) {
                const ref = storage.ref().child(`events/${Date.now()}_${file.name}`);
                await ref.put(file);
                imageUrl = await ref.getDownloadURL();
            }
            await db.collection("events").add({ title, description, date, imageUrl, createdAt: new Date() });
            alert("Подію створено!");
            closeModal("eventModal");
            loadAllData();
        }
        
        async function deleteEvent(id) { if(confirm("Видалити подію?")) { await db.collection("events").doc(id).delete(); loadAllData(); } }
        
        function renderHomeEditor() {
            document.getElementById("homeEditor").innerHTML = `
                <div style="display:flex; flex-direction:column; gap:15px;">
                    <div><label>Головний текст (Hero):</label><input type="text" id="heroText" class="search-box" style="width:100%;" value="${homeSettings.heroText || 'Твори. Без кордонів.'}"></div>
                    <div><label>Заголовок події на головній:</label><input type="text" id="eventTitleHome" class="search-box" style="width:100%;" value="${homeSettings.eventTitle || ''}" placeholder="Наприклад: 🎉 Перший день літа"></div>
                    <div><label>Опис події:</label><textarea id="eventDescHome" rows="2" style="background:#1e1e28; color:white; border:none; border-radius:8px; padding:10px;">${homeSettings.eventDesc || ''}</textarea></div>
                    <div><label>Фото для фону (URL):</label><input type="text" id="heroImage" class="search-box" style="width:100%;" value="${homeSettings.heroImage || ''}" placeholder="https://..."></div>
                    <div><label>Або завантажте фото:</label><input type="file" id="heroImageFile" accept="image/*"></div>
                    <button class="btn btn-primary" onclick="saveHomeSettings()"><i class="fas fa-save"></i> Зберегти налаштування головної</button>
                </div>`;
        }
        
        async function saveHomeSettings() {
            const heroText = document.getElementById("heroText")?.value;
            const eventTitle = document.getElementById("eventTitleHome")?.value;
            const eventDesc = document.getElementById("eventDescHome")?.value;
            let heroImage = document.getElementById("heroImage")?.value;
            const file = document.getElementById("heroImageFile")?.files[0];
            if(file) {
                const ref = storage.ref().child(`home/${Date.now()}_${file.name}`);
                await ref.put(file);
                heroImage = await ref.getDownloadURL();
            }
            await db.collection("settings").doc("homepage").set({ heroText, eventTitle, eventDesc, heroImage, updatedAt: new Date() });
            alert("Головну сторінку оновлено!");
            loadAllData();
        }
        
        async function deleteUser(id) { if(confirm("Видалити?")) { await db.collection("users").doc(id).delete(); loadAllData(); } }
        async function deletePost(id) { if(confirm("Видалити пост?")) { await db.collection("posts").doc(id).delete(); loadAllData(); } }
        
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        function showTab(tabId) {
            document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            document.getElementById(tabId).classList.add("active");
            const btn = Array.from(document.querySelectorAll(".tab-btn")).find(b => b.getAttribute("onclick")?.includes(tabId));
            if(btn) btn.classList.add("active");
        }
        
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if(await checkAccess() && user && isAdmin(user.email)) {
                document.getElementById("adminContent").innerHTML = `
                    <div class="header"><div class="logo"><i class="fas fa-crown"></i> IZUNAX Admin</div><div><span>👑 ${user.email}</span><button class="btn btn-warning" onclick="auth.signOut().then(()=>location.reload())" style="margin-left:10px;">Вийти</button><a href="index.html" class="btn btn-primary" style="margin-left:10px; text-decoration:none;">На сайт</a></div></div>
                    <div id="statsContainer"></div>
                    <div class="tabs"><button class="tab-btn active" onclick="showTab('usersTab')"><i class="fas fa-users"></i> Користувачі</button><button class="tab-btn" onclick="showTab('postsTab')"><i class="fas fa-image"></i> Пости</button><button class="tab-btn" onclick="showTab('commentsTab')"><i class="fas fa-comments"></i> Коментарі</button><button class="tab-btn" onclick="showTab('chatTab')"><i class="fas fa-comment-dots"></i> Чат</button><button class="tab-btn" onclick="showTab('eventsTab')"><i class="fas fa-calendar-alt"></i> Події</button><button class="tab-btn" onclick="showTab('homeTab')"><i class="fas fa-home"></i> Головна</button></div>
                    <div id="usersTab" class="tab-content active"><input type="text" id="userSearch" class="search-box" placeholder="Пошук..." onkeyup="renderUsers()"><div id="usersList">Завантаження...</div></div>
                    <div id="postsTab" class="tab-content"><input type="text" id="postSearch" class="search-box" placeholder="Пошук..." onkeyup="renderPosts()"><div id="postsList">Завантаження...</div></div>
                    <div id="commentsTab" class="tab-content"><div id="commentsList">Завантаження...</div></div>
                    <div id="chatTab" class="tab-content"><div id="chatList">Завантаження...</div></div>
                    <div id="eventsTab" class="tab-content"><div id="eventsList">Завантаження...</div></div>
                    <div id="homeTab" class="tab-content"><div id="homeEditor">Завантаження...</div></div>`;
                await loadAllData();
            }
        });
    </script>
</body>
</html>
