<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZUNAX - Адмін панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #f0f0f0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a970ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #121217;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #2a2a30;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #a970ff;
        }
        .stat-label {
            color: #888;
            margin-top: 8px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #1e1e28;
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #8a6eff;
        }
        .tab-content {
            display: none;
            background: #121217;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2a2a30;
        }
        .tab-content.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            overflow-x: auto;
            display: block;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a2a30;
        }
        th {
            color: #a970ff;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn-danger {
            background: #dc2626;
            color: white;
        }
        .btn-warning {
            background: #f59e0b;
            color: white;
        }
        .btn-primary {
            background: #8a6eff;
            color: white;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 0.8rem;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }
        .search-box {
            background: #1e1e28;
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 40px;
            width: 250px;
            margin-bottom: 20px;
        }
        .access-denied {
            text-align: center;
            padding: 60px 20px;
        }
        .access-denied i {
            font-size: 4rem;
            color: #dc2626;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; text-align: center; }
            th, td { font-size: 0.75rem; padding: 8px; }
            .stats { grid-template-columns: 1fr; }
            .search-box { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="adminContent">
            <div style="text-align: center; padding: 60px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 3rem;"></i>
                <p>Перевірка доступу...</p>
            </div>
        </div>
    </div>

    <script>
        // ========== КОНФІГУРАЦІЯ FIREBASE ==========
        const firebaseConfig = {
            apiKey: "AIzaSyAY58C_0NckfmkNHLsoB_eeKPcsBuB-W04",
            authDomain: "izunax-c1707.firebaseapp.com",
            projectId: "izunax-c1707",
            storageBucket: "izunax-c1707.firebasestorage.app",
            messagingSenderId: "755797664743",
            appId: "1:755797664743:web:2eaeff896c9df27075d342"
        };
        
        // Ініціалізація Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();
        
        // ========== ВАШ EMAIL ДЛЯ АДМІНКИ ==========
        // ⚠️ ЗАМІНІТЬ "vaniatopkiller@gmail.com" НА СВІЙ РЕАЛЬНИЙ EMAIL
        const ADMIN_EMAIL = "vaniatopkiller@gmail.com";
        
        // ========== ЛОГІКА АДМІНКИ ==========
        let currentUser = null;
        let usersData = [];
        let postsData = [];

        async function checkAccess() {
            const content = document.getElementById("adminContent");
            
            if (!currentUser) {
                content.innerHTML = `
                    <div class="access-denied">
                        <i class="fas fa-lock"></i>
                        <h2>Потрібен вхід</h2>
                        <p>Увійдіть через Google, щоб продовжити</p>
                        <button class="btn btn-primary" onclick="login()"><i class="fab fa-google"></i> Увійти через Google</button>
                        <br><br>
                        <a href="index.html" style="color: #8a6eff;">← На головну</a>
                    </div>`;
                return false;
            }
            
            if (currentUser.email !== ADMIN_EMAIL) {
                content.innerHTML = `
                    <div class="access-denied">
                        <i class="fas fa-shield-alt"></i>
                        <h2>Доступ заборонено</h2>
                        <p>Сторінка доступна тільки адміністратору</p>
                        <p><small>Ваш email: ${currentUser.email}</small></p>
                        <button class="btn btn-primary" onclick="window.location.href='index.html'">На головну</button>
                    </div>`;
                return false;
            }
            
            return true;
        }
        
        function login() {
            auth.signInWithPopup(provider)
                .then(() => {
                    window.location.reload();
                })
                .catch(e => alert("Помилка: " + e.message));
        }
        
        async function loadData() {
            // Завантажуємо користувачів
            const usersSnap = await db.collection("users").get();
            usersData = [];
            usersSnap.forEach(doc => {
                usersData.push({ id: doc.id, ...doc.data() });
            });
            
            // Завантажуємо пости
            const postsSnap = await db.collection("posts").orderBy("createdAt", "desc").get();
            postsData = [];
            for (const doc of postsSnap.docs) {
                const post = { id: doc.id, ...doc.data() };
                const user = usersData.find(u => u.id === post.userId);
                post.authorName = user?.name || "Невідомий";
                post.authorEmail = user?.email || "";
                postsData.push(post);
            }
            
            renderStats();
            renderUsers();
            renderPosts();
        }
        
        function renderStats() {
            document.getElementById("totalUsers").innerText = usersData.length;
            document.getElementById("totalPosts").innerText = postsData.length;
        }
        
        function renderUsers() {
            const search = document.getElementById("userSearch")?.value.toLowerCase() || "";
            const filtered = usersData.filter(u => 
                (u.name?.toLowerCase() || "").includes(search) || 
                (u.email?.toLowerCase() || "").includes(search)
            );
            
            let html = `<table><thead><tr><th>Аватар</th><th>Ім'я</th><th>Email</th><th>Дата</th><th>Дії</th></tr></thead><tbody>`;
            filtered.forEach(user => {
                html += `<tr>
                    <td><img class="user-avatar" src="${user.avatar || 'https://via.placeholder.com/40'}" onerror="this.src='https://via.placeholder.com/40'"></td>
                    <td>${user.name || "—"}</td>
                    <td>${user.email || "—"}</td>
                    <td>${user.createdAt ? new Date(user.createdAt.toDate()).toLocaleDateString() : "—"}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteUser('${user.id}')">Видалити</button></td>
                </tr>`;
            });
            html += `</tbody></table>`;
            if (filtered.length === 0) html = "<p>Користувачів не знайдено</p>";
            document.getElementById("usersList").innerHTML = html;
        }
        
        function renderPosts() {
            const search = document.getElementById("postSearch")?.value.toLowerCase() || "";
            const filtered = postsData.filter(p => 
                (p.text?.toLowerCase() || "").includes(search) || 
                (p.authorName?.toLowerCase() || "").includes(search)
            );
            
            let html = `<table><thead><tr><th>Зображення</th><th>Текст</th><th>Автор</th><th>Дата</th><th>Дії</th></tr></thead><tbody>`;
            filtered.forEach(post => {
                html += `<tr>
                    <td>${post.imageUrl ? `<i class="fas fa-image"></i>` : "—"}</td>
                    <td style="max-width:300px; word-break:break-word;">${(post.text || "").substring(0, 50)}</td>
                    <td>${post.authorName}</td>
                    <td>${post.createdAt ? new Date(post.createdAt.toDate()).toLocaleString() : "—"}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deletePost('${post.id}')">Видалити</button></td>
                </tr>`;
            });
            html += `</tbody></table>`;
            if (filtered.length === 0) html = "<p>Постів не знайдено</p>";
            document.getElementById("postsList").innerHTML = html;
        }
        
        async function deleteUser(userId) {
            if(confirm("Видалити користувача та всі його пости?")) {
                const userPosts = postsData.filter(p => p.userId === userId);
                for(const post of userPosts) {
                    await db.collection("posts").doc(post.id).delete();
                }
                await db.collection("users").doc(userId).delete();
                alert("Користувача видалено");
                loadData();
            }
        }
        
        async function deletePost(postId) {
            if(confirm("Видалити пост?")) {
                await db.collection("posts").doc(postId).delete();
                alert("Пост видалено");
                loadData();
            }
        }
        
        function showTab(tabId) {
            document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
            document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
            document.getElementById(tabId).classList.add("active");
            document.querySelector(`.tab-btn[onclick="showTab('${tabId}')"]`).classList.add("active");
        }
        
        function logout() {
            auth.signOut().then(() => {
                window.location.reload();
            });
        }
        
        // Ініціалізація
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            const hasAccess = await checkAccess();
            if(hasAccess && user && user.email === ADMIN_EMAIL) {
                document.getElementById("adminContent").innerHTML = `
                    <div class="header">
                        <div class="logo"><i class="fas fa-crown"></i> IZUNAX Admin</div>
                        <div>
                            <span style="margin-right: 15px;">👑 ${user.email}</span>
                            <button class="btn btn-warning" onclick="logout()">Вийти</button>
                            <a href="index.html" class="btn btn-primary" style="text-decoration:none; margin-left:10px;">На сайт</a>
                        </div>
                    </div>
                    
                    <div class="stats">
                        <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div class="stat-label">Користувачів</div></div>
                        <div class="stat-card"><div class="stat-number" id="totalPosts">0</div><div class="stat-label">Постів</div></div>
                    </div>
                    
                    <div class="tabs">
                        <button class="tab-btn active" onclick="showTab('usersTab')"><i class="fas fa-users"></i> Користувачі</button>
                        <button class="tab-btn" onclick="showTab('postsTab')"><i class="fas fa-image"></i> Пости</button>
                    </div>
                    
                    <div id="usersTab" class="tab-content active">
                        <input type="text" id="userSearch" class="search-box" placeholder="Пошук користувачів..." onkeyup="renderUsers()">
                        <div id="usersList">Завантаження...</div>
                    </div>
                    
                    <div id="postsTab" class="tab-content">
                        <input type="text" id="postSearch" class="search-box" placeholder="Пошук постів..." onkeyup="renderPosts()">
                        <div id="postsList">Завантаження...</div>
                    </div>
                `;
                await loadData();
            }
        });
    </script>
</body>
</html>
